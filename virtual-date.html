<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Our Virtual Date Night 🕯️</title>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#030108;--gold:#C9A84C;--gold-l:#E8D5A3;--gold-d:#8B6914;
  --rose:#B85A78;--rose-l:#E8A0B4;--amber:#e8813a;--cream:#f9f0e1;
}
html,body{height:100%;width:100%;overflow:hidden;background:var(--bg)}
body{font-family:'Cormorant Garamond',serif;color:var(--cream);display:flex;flex-direction:column;align-items:center;justify-content:center}

/* ═══ SCREENS ═══ */
.screen{display:none;width:100%;height:100%;align-items:center;justify-content:center;flex-direction:column}
.screen.active{display:flex}

/* ═══ SETUP SCREEN ═══ */
#setupScreen{
  background:radial-gradient(ellipse at 50% 50%,rgba(120,60,10,0.3) 0%,rgba(3,1,8,1) 70%);
  gap:2rem;padding:2rem;text-align:center
}
.setup-title{font-family:'Dancing Script',cursive;font-size:clamp(2rem,7vw,3.5rem);color:var(--gold);text-shadow:0 0 30px rgba(201,168,76,0.4)}
.setup-sub{font-style:italic;color:rgba(249,240,225,0.55);font-size:clamp(0.9rem,2.5vw,1.1rem)}
.role-cards{display:flex;gap:1.5rem;flex-wrap:wrap;justify-content:center;margin-top:0.5rem}
.role-card{
  background:rgba(255,255,255,0.04);border:1.5px solid rgba(201,168,76,0.3);
  border-radius:20px;padding:2rem 2.5rem;cursor:pointer;min-width:150px;
  transition:all 0.35s cubic-bezier(0.34,1.56,0.64,1);text-align:center
}
.role-card:hover{transform:translateY(-6px) scale(1.04);border-color:var(--gold);box-shadow:0 12px 40px rgba(201,168,76,0.25)}
.role-card.aloo-card:hover{border-color:var(--rose);box-shadow:0 12px 40px rgba(184,90,120,0.3)}
.role-card .r-emoji{font-size:2.8rem;display:block;margin-bottom:0.6rem}
.role-card .r-name{font-family:'Dancing Script',cursive;font-size:1.6rem;color:var(--gold)}
.role-card.aloo-card .r-name{color:var(--rose-l)}

/* ═══ ROOM SCREEN ═══ */
#roomScreen{
  background:radial-gradient(ellipse at 50% 50%,rgba(80,40,10,0.3) 0%,rgba(3,1,8,1) 70%);
  gap:1.5rem;padding:2rem;text-align:center
}
.room-title{font-family:'Dancing Script',cursive;font-size:clamp(1.6rem,5vw,2.5rem);color:var(--gold)}
.room-desc{font-style:italic;color:rgba(249,240,225,0.6);font-size:clamp(0.9rem,2.5vw,1.05rem);max-width:340px;line-height:1.7}

.code-box{
  background:rgba(201,168,76,0.08);border:2px solid rgba(201,168,76,0.35);
  border-radius:16px;padding:1.2rem 2rem;margin:0.5rem 0
}
.code-label{font-style:italic;color:rgba(249,240,225,0.45);font-size:0.85rem;margin-bottom:0.4rem}
.code-value{font-family:'Dancing Script',cursive;font-size:2rem;color:var(--gold-l);word-break:break-all;letter-spacing:0.05em}

.btn{
  padding:0.85rem 2rem;border:none;border-radius:50px;cursor:pointer;
  font-family:'Cormorant Garamond',serif;font-size:1.05rem;
  transition:transform 0.2s,box-shadow 0.2s;display:inline-flex;align-items:center;gap:0.5rem
}
.btn-gold{background:linear-gradient(135deg,var(--gold-d),var(--gold));color:#000}
.btn-rose{background:linear-gradient(135deg,#8B2252,var(--rose));color:#fff}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(201,168,76,0.3)}
.btn-sm{padding:0.5rem 1.2rem;font-size:0.9rem}

.join-input{
  width:100%;max-width:340px;padding:0.9rem 1.2rem;
  background:rgba(255,255,255,0.05);border:1px solid rgba(201,168,76,0.3);
  border-radius:12px;color:var(--gold-l);font-family:'Cormorant Garamond',serif;
  font-size:1rem;outline:none;text-align:center;transition:border-color 0.3s
}
.join-input::placeholder{color:rgba(255,255,255,0.25)}
.join-input:focus{border-color:rgba(201,168,76,0.6)}

.status-dot{
  display:inline-block;width:10px;height:10px;border-radius:50%;
  background:rgba(201,168,76,0.5);animation:pulse 1.5s ease-in-out infinite;margin-right:0.4rem
}
.status-dot.green{background:#4caf50;animation:none}
.status-dot.red{background:#f44336;animation:none}
@keyframes pulse{0%,100%{opacity:0.5;transform:scale(1)}50%{opacity:1;transform:scale(1.3)}}

.err-msg{color:#ff8a8a;font-style:italic;font-size:0.9rem;min-height:1.2rem}

/* ═══ DATE NIGHT SCENE ═══ */
#dateScreen{flex-direction:column;background:#030108;position:relative;overflow:hidden}

/* Top: scene area */
.scene-area{
  flex:1;width:100%;position:relative;overflow:hidden;
  background:radial-gradient(ellipse at 50% 75%,rgba(140,65,10,0.45) 0%,rgba(80,30,5,0.2) 30%,rgba(3,1,8,1) 70%)
}

/* Stars through window */
.star-window{
  position:absolute;top:5%;left:50%;transform:translateX(-50%);
  width:min(180px,40vw);height:min(140px,30vw);
  border:3px solid rgba(201,168,76,0.2);border-radius:8px 8px 50% 50%;
  background:radial-gradient(ellipse,#0a0520 0%,#050215 100%);
  overflow:hidden;opacity:0.8
}
.star-window canvas{position:absolute;inset:0}

/* Avatars */
.avatars-row{
  position:absolute;bottom:0;left:0;right:0;
  display:flex;align-items:flex-end;justify-content:space-between;
  padding:0 2vw
}
.avatar-wrap{
  display:flex;flex-direction:column;align-items:center;
  position:relative;width:min(160px,38vw);flex-shrink:0
}
.avatar-wrap svg{width:100%;height:auto;max-height:55vh;filter:drop-shadow(0 0 20px rgba(200,130,50,0.25))}
.avatar-name{
  font-family:'Dancing Script',cursive;font-size:clamp(0.9rem,3vw,1.2rem);
  color:var(--gold-l);margin-bottom:0.3rem;text-shadow:0 0 10px rgba(201,168,76,0.5)
}

/* Table */
.table-wrap{
  position:absolute;bottom:0;left:50%;transform:translateX(-50%);
  display:flex;flex-direction:column;align-items:center;
  width:min(260px,45vw)
}
.table-top{
  width:100%;height:min(22px,4vw);
  background:linear-gradient(to bottom,#5a3510,#3a2008);
  border-radius:50% 50% 0 0 / 60% 60% 0 0;
  box-shadow:0 -4px 20px rgba(200,130,50,0.2)
}
.table-leg-wrap{display:flex;justify-content:center;gap:40%}
.table-leg{width:min(12px,2.5vw);height:min(40px,8vw);background:linear-gradient(to bottom,#3a2008,#241404);border-radius:0 0 4px 4px}

/* Candles on table */
.table-items{
  position:absolute;bottom:min(40px,8vw);left:50%;transform:translateX(-50%);
  display:flex;align-items:flex-end;gap:min(18px,4vw)
}
.candle-mini{display:flex;flex-direction:column;align-items:center}
.flame{
  width:min(10px,2vw);height:min(16px,3.5vw);
  background:radial-gradient(ellipse at bottom,#fffad0,#ffbe44 40%,#ff8800 70%,transparent);
  border-radius:50% 50% 30% 30%/60% 60% 40% 40%;
  animation:flicker 1.8s ease-in-out infinite;
  box-shadow:0 0 6px 2px rgba(255,150,40,0.5),0 0 18px 5px rgba(255,100,20,0.15)
}
@keyframes flicker{0%,100%{transform:scaleX(1) rotate(-1deg)}30%{transform:scaleX(0.85) rotate(2deg)}60%{transform:scaleX(1.08) rotate(-2deg)}}
.wick{width:1.5px;height:4px;background:#222}
.wax{width:min(12px,2.5vw);height:min(30px,6vw);background:linear-gradient(to right,rgba(255,255,255,0.1),transparent,rgba(255,255,255,0.08)),linear-gradient(to bottom,#d4b068,#a07838);border-radius:2px 2px 4px 4px}
.rose-center{font-size:min(24px,5vw)}

/* Thought bubbles */
.thought-bubble{
  position:absolute;max-width:min(180px,42vw);min-width:80px;
  background:rgba(255,252,245,0.97);border-radius:18px;
  padding:0.55rem 0.75rem;color:#1a0a0a;font-size:clamp(0.7rem,2.5vw,0.88rem);
  line-height:1.5;box-shadow:0 4px 20px rgba(0,0,0,0.4);
  animation:popIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
  z-index:10;pointer-events:none;word-wrap:break-word
}
.thought-bubble .t-name{font-style:italic;font-size:0.7em;margin-bottom:0.2rem;display:block}
/* Small circles for cloud tail */
.thought-bubble::before,.thought-bubble::after{content:'';position:absolute;background:rgba(255,252,245,0.97);border-radius:50%}
.thought-bubble::before{width:10px;height:10px;bottom:-10px}
.thought-bubble::after{width:6px;height:6px;bottom:-18px}

/* Aloo: top-left of avatar */
.aloo-thought{bottom:80%;left:10%;text-align:left}
.aloo-thought .t-name{color:var(--rose)}
.aloo-thought::before{left:15%}
.aloo-thought::after{left:12%}

/* Adnan: top-right of avatar */
.adnan-thought{bottom:80%;right:10%;text-align:right}
.adnan-thought .t-name{color:var(--gold)}
.adnan-thought::before{right:15%}
.adnan-thought::after{right:12%}

.thought-hide{animation:fadeOut 0.5s ease forwards}
@keyframes popIn{0%{opacity:0;transform:scale(0.5)}100%{opacity:1;transform:scale(1)}}
@keyframes fadeOut{to{opacity:0;transform:scale(0.9)}}

/* Bottom: input area */
.input-area{
  width:100%;display:flex;flex-shrink:0;
  border-top:1px solid rgba(201,168,76,0.12)
}
.chat-panel{
  flex:1;display:flex;flex-direction:column;padding:0.6rem 0.7rem;gap:0.4rem;
  border-right:1px solid rgba(201,168,76,0.1)
}
.chat-panel:last-child{border-right:none}
.panel-label{font-family:'Dancing Script',cursive;font-size:clamp(0.8rem,2.5vw,1rem);margin-bottom:0.2rem}
.panel-label.aloo-label{color:var(--rose-l)}
.panel-label.adnan-label{color:var(--gold-l)}
.chat-row{display:flex;gap:0.4rem;align-items:center}
.chat-input{
  flex:1;background:rgba(255,255,255,0.04);border:1px solid rgba(201,168,76,0.2);
  border-radius:20px;padding:0.5rem 0.8rem;color:var(--cream);
  font-family:'Cormorant Garamond',serif;font-size:clamp(0.8rem,2.5vw,0.95rem);outline:none;
  transition:border-color 0.3s
}
.chat-input::placeholder{color:rgba(255,255,255,0.2);font-style:italic}
.chat-input:focus{border-color:rgba(201,168,76,0.4)}
.send-btn{
  width:34px;height:34px;border-radius:50%;border:none;cursor:pointer;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:0.9rem;
  transition:transform 0.2s,box-shadow 0.2s
}
.send-btn.aloo-send{background:linear-gradient(135deg,#8B2252,var(--rose));color:#fff}
.send-btn.adnan-send{background:linear-gradient(135deg,var(--gold-d),var(--gold));color:#000}
.send-btn:hover{transform:scale(1.1)}

/* Top bar */
.top-bar{
  position:absolute;top:0;left:0;right:0;
  display:flex;justify-content:space-between;align-items:center;
  padding:0.5rem 1rem;z-index:20;background:rgba(3,1,8,0.5);backdrop-filter:blur(4px)
}
.top-bar-title{font-family:'Dancing Script',cursive;font-size:clamp(0.9rem,3vw,1.2rem);color:var(--gold)}
.conn-status{display:flex;align-items:center;font-size:0.78rem;color:rgba(255,255,255,0.5);font-style:italic}
.top-icons{display:flex;gap:0.5rem}
.icon-btn{background:none;border:1px solid rgba(201,168,76,0.2);border-radius:20px;padding:0.25rem 0.6rem;color:var(--gold);cursor:pointer;font-size:0.85rem;transition:border-color 0.3s}
.icon-btn:hover{border-color:var(--gold)}

/* Ambient glow overlay */
.candle-glow-overlay{
  position:absolute;bottom:min(55px,12vw);left:50%;transform:translateX(-50%);
  width:min(300px,60vw);height:min(200px,40vw);
  background:radial-gradient(ellipse,rgba(220,120,30,0.2) 0%,transparent 70%);
  pointer-events:none;filter:blur(8px)
}

/* Responsive — input area stacks on mobile below 500px width */
@media(max-width:480px){
  .input-area{flex-direction:column}
  .chat-panel{border-right:none;border-bottom:1px solid rgba(201,168,76,0.1);padding:0.5rem 0.8rem}
  .chat-panel:last-child{border-bottom:none}
  .avatar-wrap{width:min(130px,38vw)}
}
</style>
</head>
<body>

<!-- ── SETUP SCREEN ── -->
<div class="screen active" id="setupScreen">
  <p class="setup-title">🕯️ Virtual Date Night</p>
  <p class="setup-sub">A candlelit dinner, just for the two of you</p>
  <div class="role-cards">
    <div class="role-card aloo-card" onclick="selectRole('aloo')">
      <span class="r-emoji">💛</span>
      <span class="r-name">I am Aloo</span>
    </div>
    <div class="role-card" onclick="selectRole('adnan')">
      <span class="r-emoji">🖤</span>
      <span class="r-name">I am Adnan</span>
    </div>
  </div>
</div>

<!-- ── ROOM SCREEN ── -->
<div class="screen" id="roomScreen">
  <p class="room-title" id="roomTitle">Setting up your table… 🕯️</p>
  <p class="room-desc" id="roomDesc"></p>

  <!-- Adnan: shows code -->
  <div id="adnanPanel" style="display:none;flex-direction:column;align-items:center;gap:1rem;width:100%;max-width:380px;padding:0 1.5rem">
    <div class="code-box" style="width:100%">
      <div class="code-label">Your room code — share with Aloo</div>
      <div class="code-value" id="codeDisplay">…</div>
    </div>
    <div style="display:flex;gap:0.7rem;flex-wrap:wrap;justify-content:center">
      <button class="btn btn-gold btn-sm" onclick="copyCode()">📋 Copy Code</button>
      <button class="btn btn-gold btn-sm" onclick="waShare()">💬 Send via WhatsApp</button>
    </div>
    <div class="conn-status"><span class="status-dot" id="adnanDot"></span><span id="adnanStatus">Waiting for Aloo to join…</span></div>
  </div>

  <!-- Aloo: enter code -->
  <div id="alooPanel" style="display:none;flex-direction:column;align-items:center;gap:1rem;width:100%;max-width:380px;padding:0 1.5rem">
    <input class="join-input" id="codeInput" placeholder="Paste Adnan's room code here…" autocomplete="off" autocorrect="off" spellcheck="false"/>
    <button class="btn btn-rose" onclick="joinRoom()">💛 Join Our Date</button>
    <div class="err-msg" id="joinErr"></div>
  </div>

  <div class="conn-status" id="loadingStatus" style="margin-top:0.5rem">
    <span class="status-dot" id="loadDot"></span>
    <span id="loadText">Connecting to server…</span>
  </div>

  <button class="btn btn-gold btn-sm" id="retryBtn" onclick="retryPeer()" style="display:none;margin-top:1rem">🔄 Retry</button>
</div>

<!-- ── DATE NIGHT SCENE ── -->
<div class="screen" id="dateScreen">

  <!-- Top bar -->
  <div class="top-bar">
    <span class="top-bar-title">🕯️ Our Date Night</span>
    <div class="conn-status"><span class="status-dot" id="connDot"></span><span id="connStatus">Connected 🖤</span></div>
    <div class="top-icons">
      <button class="icon-btn" onclick="toggleMusic()" id="musicBtn">♪</button>
      <button class="icon-btn" onclick="clearBubbles()">✕</button>
    </div>
  </div>

  <!-- Scene -->
  <div class="scene-area">
    <!-- Moon window -->
    <div class="star-window"><canvas id="windowCanvas"></canvas></div>

    <!-- Candle glow -->
    <div class="candle-glow-overlay"></div>

    <!-- Table center -->
    <div class="table-wrap">
      <div class="table-items">
        <div class="candle-mini"><div class="flame"></div><div class="wick"></div><div class="wax"></div></div>
        <span class="rose-center">🌹</span>
        <div class="candle-mini"><div class="flame"></div><div class="wick"></div><div class="wax"></div></div>
      </div>
      <div class="table-top"></div>
      <div class="table-leg-wrap"><div class="table-leg"></div><div class="table-leg"></div></div>
    </div>

    <!-- Avatars -->
    <div class="avatars-row">

      <!-- Alfiya (left) -->
      <div class="avatar-wrap" id="alooWrap">
        <div class="thought-bubble aloo-thought" id="alooThought" style="display:none">
          <span class="t-name">Aloo 💛</span>
          <span id="alooThoughtText"></span>
        </div>
        <span class="avatar-name">Aloo 💛</span>
        <!-- Female SVG avatar -->
        <svg viewBox="0 0 160 280" xmlns="http://www.w3.org/2000/svg">
          <!-- Long hair (back) -->
          <ellipse cx="80" cy="72" rx="38" ry="48" fill="#0f0804"/>
          <!-- Face -->
          <ellipse cx="80" cy="65" rx="29" ry="31" fill="#d4956a"/>
          <!-- Hair (front top) -->
          <path d="M52 58 Q80 38 108 58" fill="#150a03"/>
          <!-- Hair side strands -->
          <path d="M52 65 Q44 100 48 135" stroke="#0f0804" stroke-width="11" fill="none" stroke-linecap="round"/>
          <path d="M108 65 Q116 100 112 135" stroke="#0f0804" stroke-width="11" fill="none" stroke-linecap="round"/>
          <!-- Bindi -->
          <circle cx="80" cy="47" r="4.5" fill="#C9A84C"/>
          <!-- Eyes -->
          <ellipse cx="67" cy="63" rx="6.5" ry="7" fill="#0d0806"/>
          <ellipse cx="93" cy="63" rx="6.5" ry="7" fill="#0d0806"/>
          <circle cx="65" cy="61" r="2" fill="white"/>
          <circle cx="91" cy="61" r="2" fill="white"/>
          <!-- Eyebrows -->
          <path d="M59 56 Q67 52 74 56" stroke="#150a03" stroke-width="2.5" fill="none" stroke-linecap="round"/>
          <path d="M86 56 Q93 52 101 56" stroke="#150a03" stroke-width="2.5" fill="none" stroke-linecap="round"/>
          <!-- Nose -->
          <path d="M75 73 Q80 77 85 73" stroke="#a06040" stroke-width="2" fill="none" stroke-linecap="round"/>
          <!-- Lips -->
          <path d="M67 82 Q80 90 93 82" stroke="#9b2252" stroke-width="3.5" fill="none" stroke-linecap="round"/>
          <path d="M70 82 Q80 86 90 82" fill="#c83060" opacity="0.4"/>
          <!-- Earrings -->
          <circle cx="51" cy="70" r="6" fill="#C9A84C" opacity="0.9"/>
          <circle cx="51" cy="70" r="3.5" fill="#E8D5A3"/>
          <circle cx="109" cy="70" r="6" fill="#C9A84C" opacity="0.9"/>
          <circle cx="109" cy="70" r="3.5" fill="#E8D5A3"/>
          <!-- Nose stud -->
          <circle cx="76" cy="76" r="2.5" fill="#E8D5A3"/>
          <!-- Neck -->
          <rect x="69" y="93" width="22" height="18" rx="6" fill="#d4956a"/>
          <!-- Rose kurta - upper body -->
          <path d="M32 110 Q56 102 80 110 Q104 102 128 110 L134 195 Q80 208 26 195 Z" fill="#8B2252"/>
          <!-- Neckline -->
          <path d="M72 110 L80 113 L88 110 L84 135 L80 138 L76 135 Z" fill="#6B1232" opacity="0.7"/>
          <!-- Dupatta -->
          <path d="M32 110 Q18 145 14 185" stroke="rgba(240,190,210,0.55)" stroke-width="12" fill="none" stroke-linecap="round"/>
          <path d="M32 110 Q22 140 25 170" stroke="rgba(240,190,210,0.3)" stroke-width="6" fill="none" stroke-linecap="round"/>
          <!-- Arms -->
          <path d="M32 135 Q18 170 20 205" stroke="#d4956a" stroke-width="14" fill="none" stroke-linecap="round"/>
          <path d="M128 135 Q142 170 140 205" stroke="#d4956a" stroke-width="14" fill="none" stroke-linecap="round"/>
          <!-- Hands -->
          <ellipse cx="19" cy="210" rx="14" ry="10" fill="#d4956a"/>
          <ellipse cx="141" cy="210" rx="14" ry="10" fill="#d4956a"/>
          <!-- Lower body (seated - kurta) -->
          <path d="M26 190 Q80 202 134 190 L136 275 Q80 282 24 275 Z" fill="#7a1840"/>
          <!-- Kurta pattern dots -->
          <circle cx="55" cy="155" r="3" fill="rgba(201,168,76,0.3)"/>
          <circle cx="80" cy="160" r="3" fill="rgba(201,168,76,0.3)"/>
          <circle cx="105" cy="155" r="3" fill="rgba(201,168,76,0.3)"/>
          <!-- Candle glow on face -->
          <ellipse cx="80" cy="65" rx="29" ry="31" fill="rgba(255,150,50,0.06)"/>
        </svg>
      </div>

      <!-- Adnan (right) -->
      <div class="avatar-wrap" id="adnanWrap">
        <div class="thought-bubble adnan-thought" id="adnanThought" style="display:none">
          <span class="t-name">Adnan 🖤</span>
          <span id="adnanThoughtText"></span>
        </div>
        <span class="avatar-name">Adnan 🖤</span>
        <!-- Male SVG avatar -->
        <svg viewBox="0 0 160 280" xmlns="http://www.w3.org/2000/svg">
          <!-- Short hair -->
          <ellipse cx="80" cy="48" rx="30" ry="22" fill="#0a0604"/>
          <path d="M50 50 Q80 30 110 50 Q112 70 110 72" fill="#0a0604"/>
          <path d="M50 50 Q48 70 50 72" fill="#0a0604"/>
          <!-- Face -->
          <ellipse cx="80" cy="68" rx="28" ry="30" fill="#c47a3a"/>
          <!-- Hair above face -->
          <path d="M52 52 Q80 36 108 52 L108 58 Q80 44 52 58 Z" fill="#0a0604"/>
          <!-- Sideburns -->
          <rect x="52" y="60" width="6" height="18" rx="3" fill="#0a0604" opacity="0.6"/>

          <path d="M56 90 Q80 100 104 90" stroke="#2a1505" stroke-width="4" fill="none" opacity="0.45" stroke-linecap="round"/>

          <ellipse cx="67" cy="65" rx="6.5" ry="7" fill="#0a0604"/>

          <path d="M30 112 Q54 104 80 112 Q106 104 130 112 L136 200 Q80 212 24 200 Z" fill="#1a1a40"/>
          <!-- Kurta collar (V-neck) -->
          <path d="M70 112 L80 115 L90 112 L86 140 L80 143 L74 140 Z" fill="#252560" opacity="0.8"/>
          <!-- Kurta buttons -->
          <circle cx="80" cy="148" r="2.5" fill="rgba(201,168,76,0.5)"/>
          <circle cx="80" cy="162" r="2.5" fill="rgba(201,168,76,0.5)"/>
          <!-- Arms -->
          <path d="M30 140 Q16 175 18 208" stroke="#c47a3a" stroke-width="14" fill="none" stroke-linecap="round"/>
          <path d="M130 140 Q144 175 142 208" stroke="#c47a3a" stroke-width="14" fill="none" stroke-linecap="round"/>
          <!-- Hands -->
          <ellipse cx="17" cy="213" rx="14" ry="10" fill="#c47a3a"/>

  </div><!-- /.scene-area -->

  <!-- Input area -->
  <div class="input-area">
    <div class="chat-panel">
      <div class="panel-label aloo-label">Aloo 💛</div>
      <div class="chat-row">
        <input class="chat-input" id="alooInput" placeholder="Type something, Aloo…" autocomplete="off"/>
        <button class="send-btn aloo-send" onclick="sendMsg('aloo')">➤</button>
      </div>
    </div>
    <div class="chat-panel">
      <div class="panel-label adnan-label">Adnan 🖤</div>
      <div class="chat-row">
        <input class="chat-input" id="adnanInput" placeholder="Type something…" autocomplete="off"/>
        <button class="send-btn adnan-send" onclick="sendMsg('adnan')">➤</button>
      </div>
    </div>
  </div>

</div><!-- /#dateScreen -->

<audio id="bgAudio" loop src="sitare.mp3"></audio>

<script>
let myRole = null;
let peer = null;
let conn = null;
let myPeerId = null;
let peerTimeout = null;

/* ━━━ ROLE SELECT ━━━ */
function selectRole(role) {
  myRole = role;
  show('roomScreen');

  if (role === 'adnan') {
    document.getElementById('roomTitle').textContent = 'Setting up your table… 🕯️';
    document.getElementById('roomDesc').textContent = 'We\'re getting your room code ready.';
    startPeer();
  } else {
    document.getElementById('roomTitle').textContent = 'Join Adnan\'s Table 💛';
    document.getElementById('roomDesc').textContent = 'Enter the code Adnan shared with you.';
    document.getElementById('loadingStatus').style.display = 'none';
    startPeer(); // init peer in background (needed to connect)
    setTimeout(() => {
      document.getElementById('alooPanel').style.display = 'flex';
      document.getElementById('codeInput').addEventListener('keydown', e => { if (e.key === 'Enter') joinRoom(); });
    }, 100);
  }
}

/* ━━━ PEER INIT ━━━ */
function startPeer() {
  document.getElementById('loadingStatus').style.display = 'flex';
  document.getElementById('loadText').textContent = 'Connecting to server…';
  document.getElementById('retryBtn').style.display = 'none';

  // Timeout: if PeerJS doesn't respond in 12s, show retry
  peerTimeout = setTimeout(() => {
    document.getElementById('loadText').textContent = 'Server is slow — please retry';
    document.getElementById('loadDot').className = 'status-dot red';
    document.getElementById('retryBtn').style.display = 'inline-flex';
  }, 12000);

  peer = new Peer(undefined, {
    config: {
      iceServers: [
        {urls: 'stun:stun.l.google.com:19302'},
        {urls: 'stun:stun1.l.google.com:19302'},
        {urls: 'stun:stun2.l.google.com:19302'}
      ]
    }
  });

  peer.on('open', id => {
    clearTimeout(peerTimeout);
    myPeerId = id;
    document.getElementById('loadingStatus').style.display = 'none';

    if (myRole === 'adnan') {
      document.getElementById('roomTitle').textContent = 'Your Room Code is Ready 🕯️';
      document.getElementById('roomDesc').textContent = 'Share this code with Aloo on WhatsApp and wait for her to join.';
      document.getElementById('codeDisplay').textContent = id;
      document.getElementById('adnanPanel').style.display = 'flex';

      // Wait for Aloo to connect
      peer.on('connection', c => {
        setupConn(c);
      });
    }
    // Aloo's peer is ready in background — she'll use joinRoom()
  });

  peer.on('error', err => {
    clearTimeout(peerTimeout);
    console.error('PeerJS error:', err.type, err);
    document.getElementById('loadText').textContent = 'Error: ' + err.type + '. Tap retry.';
    document.getElementById('loadDot').className = 'status-dot red';
    document.getElementById('retryBtn').style.display = 'inline-flex';
    if (err.type === 'peer-unavailable') {
      document.getElementById('joinErr').textContent = 'Code not found. Check the code and try again.';
    }
  });

  peer.on('disconnected', () => {
    document.getElementById('connDot').className = 'status-dot';
    document.getElementById('connStatus').textContent = 'Reconnecting…';
    peer.reconnect();
  });
}

function retryPeer() {
  if (peer) { try { peer.destroy(); } catch(e){} }
  startPeer();
}

/* ━━━ ALOO JOINS ━━━ */
function joinRoom() {
  const code = document.getElementById('codeInput').value.trim();
  if (!code) {
    document.getElementById('joinErr').textContent = 'Please enter the code first.';
    return;
  }
  document.getElementById('joinErr').textContent = '';
  document.getElementById('roomTitle').textContent = 'Joining your date… 💛';

  if (!peer || peer.destroyed) {
    document.getElementById('joinErr').textContent = 'Still connecting, please wait…';
    return;
  }

  try {
    const c = peer.connect(code, {reliable: true});
    setupConn(c);
  } catch(e) {
    document.getElementById('joinErr').textContent = 'Could not connect. Check the code.';
  }
}

/* ━━━ CONNECTION SETUP ━━━ */
function setupConn(c) {
  conn = c;

  conn.on('open', () => {
    clearTimeout(peerTimeout);
    showDateScene();
    // Send a greeting
    conn.send({from: myRole, message: myRole === 'aloo' ? '💛 Aloo has joined the table!' : '🖤 Adnan is here!'});
  });

  conn.on('data', data => {
    showThought(data.from, data.message);
    playPing();
  });

  conn.on('close', () => {
    document.getElementById('connDot').className = 'status-dot red';
    document.getElementById('connStatus').textContent = 'Disconnected 💔';
  });

  conn.on('error', err => {
    console.error('conn error:', err);
    document.getElementById('connStatus').textContent = 'Connection error';
  });

  // Timeout if open never fires
  setTimeout(() => {
    if (!conn || conn.open === false) {
      document.getElementById('joinErr').textContent = 'Could not connect. Make sure the code is correct.';
      document.getElementById('roomTitle').textContent = 'Connection failed';
    }
  }, 15000);
}

/* ━━━ SHOW DATE SCENE ━━━ */
function showDateScene() {
  show('dateScreen');
  document.getElementById('connDot').className = 'status-dot green';
  document.getElementById('connStatus').textContent = 'Connected 🖤';
  initWindowStars();

  // Enter key to send
  document.getElementById('alooInput').addEventListener('keydown', e => { if(e.key==='Enter') sendMsg('aloo'); });
  document.getElementById('adnanInput').addEventListener('keydown', e => { if(e.key==='Enter') sendMsg('adnan'); });

  // Highlight own input
  if (myRole === 'aloo') {
    document.getElementById('alooInput').style.borderColor = 'rgba(184,90,120,0.5)';
  } else {
    document.getElementById('adnanInput').style.borderColor = 'rgba(201,168,76,0.5)';
  }

  // Play music
  const audio = document.getElementById('bgAudio');
  audio.volume = 0.4;
  audio.play().then(() => { document.getElementById('musicBtn').textContent = '🔊'; }).catch(()=>{});
}

/* ━━━ SEND MESSAGE ━━━ */
function sendMsg(from) {
  const input = document.getElementById(from + 'Input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';

  // Show locally
  showThought(from, text);
  playPing();

  // Send to other person
  if (conn && conn.open) {
    conn.send({from, message: text});
  }
}

/* ━━━ THOUGHT BUBBLE ━━━ */
let alooTimer = null, adnanTimer = null;

function showThought(from, text) {
  const bubble = document.getElementById(from + 'Thought');
  const textEl = document.getElementById(from + 'ThoughtText');

  // Reset animation
  bubble.classList.remove('thought-hide');
  bubble.style.animation = 'none';
  bubble.offsetHeight; // reflow
  bubble.style.animation = '';
  bubble.style.display = 'block';
  textEl.textContent = text;

  // Clear old timer
  if (from === 'aloo' && alooTimer) clearTimeout(alooTimer);
  if (from === 'adnan' && adnanTimer) clearTimeout(adnanTimer);

  // Auto-hide after 10 seconds
  const t = setTimeout(() => {
    bubble.classList.add('thought-hide');
    setTimeout(() => { bubble.style.display = 'none'; }, 500);
  }, 10000);
  if (from === 'aloo') alooTimer = t;
  else adnanTimer = t;
}

function clearBubbles() {
  ['aloo','adnan'].forEach(r => {
    const b = document.getElementById(r+'Thought');
    b.style.display = 'none';
    b.classList.remove('thought-hide');
  });
}

/* ━━━ MUSIC ━━━ */
let musicPlaying = false;
function toggleMusic() {
  const audio = document.getElementById('bgAudio');
  const btn = document.getElementById('musicBtn');
  if (audio.paused) {
    audio.play().then(() => { musicPlaying=true; btn.textContent='🔊'; }).catch(()=>{});
  } else {
    audio.pause(); musicPlaying=false; btn.textContent='♪';
  }
}

/* ━━━ COPY / WHATSAPP ━━━ */
function copyCode() {
  const code = document.getElementById('codeDisplay').textContent;
  navigator.clipboard.writeText(code).then(() => {
    const btn = event.target;
    btn.textContent = '✓ Copied!';
    setTimeout(() => btn.textContent = '📋 Copy Code', 2000);
  }).catch(() => {
    // Fallback
    const el = document.getElementById('codeDisplay');
    const range = document.createRange();
    range.selectNode(el);
    window.getSelection().removeAllRanges();
    window.getSelection().addRange(range);
    document.execCommand('copy');
  });
}

function waShare() {
  const code = document.getElementById('codeDisplay').textContent;
  const msg = encodeURIComponent('Aloo, join our virtual date night! 🕯️ Open this link and enter my room code:\n\nCode: ' + code + '\n\nLink: https://adnantamboli.github.io/alfiya-universe/virtual-date.html 🖤');
  window.open('https://wa.me/?text=' + msg, '_blank');
}

/* ━━━ PING SOUND ━━━ */
function playPing() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value = 880;
    osc.type = 'sine';
    gain.gain.setValueAtTime(0, ctx.currentTime);
    gain.gain.linearRampToValueAtTime(0.12, ctx.currentTime + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.6);
    osc.start(); osc.stop(ctx.currentTime + 0.6);
  } catch(e) {}
}

/* ━━━ WINDOW STARS CANVAS ━━━ */
function initWindowStars() {
  const c = document.getElementById('windowCanvas');
  const wrap = c.parentElement;
  c.width = wrap.clientWidth * 2;
  c.height = wrap.clientHeight * 2;
  c.style.width = wrap.clientWidth + 'px';
  c.style.height = wrap.clientHeight + 'px';
  const ctx = c.getContext('2d');

  const stars = Array.from({length:40}, () => ({
    x: Math.random()*c.width, y: Math.random()*c.height,
    r: Math.random()*1.5+0.5, phase: Math.random()*Math.PI*2, speed: 0.01+Math.random()*0.02
  }));

  // Moon
  ctx.beginPath();
  ctx.arc(c.width*0.8, c.height*0.25, 18, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(232,213,163,0.85)';
  ctx.fill();
  ctx.beginPath();
  ctx.arc(c.width*0.87, c.height*0.22, 15, 0, Math.PI*2);
  ctx.fillStyle = '#0a0520';
  ctx.fill();

  function tick(t) {
    ctx.clearRect(0, 0, c.width, c.height);
    // Redraw moon
    ctx.beginPath(); ctx.arc(c.width*0.8, c.height*0.25, 18, 0, Math.PI*2);
    ctx.fillStyle='rgba(232,213,163,0.85)'; ctx.fill();
    ctx.beginPath(); ctx.arc(c.width*0.87, c.height*0.22, 15, 0, Math.PI*2);
    ctx.fillStyle='#0a0520'; ctx.fill();
    // Stars
    stars.forEach(s => {
      const a = 0.4 + 0.5*Math.abs(Math.sin(t*s.speed+s.phase));
      ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
      ctx.fillStyle = `rgba(255,245,220,${a})`; ctx.fill();
    });
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

/* ━━━ UTILS ━━━ */
function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
</script>
