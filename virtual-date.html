<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Our Virtual Date Night 🕯️</title>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#030108;--gold:#C9A84C;--gold-l:#E8D5A3;--gold-d:#8B6914;
  --rose:#B85A78;--rose-l:#E8A0B4;--cream:#f9f0e1;
}
html,body{height:100%;width:100%;overflow:hidden;background:var(--bg)}
body{font-family:'Cormorant Garamond',serif;color:var(--cream)}

/* ═══ SCREENS ═══ */
.screen{display:none;width:100%;height:100%;align-items:center;justify-content:center;flex-direction:column;position:fixed;inset:0}
.screen.active{display:flex}

/* ═══ SETUP SCREEN ═══ */
#setupScreen{
  background:radial-gradient(ellipse at 50% 40%, rgba(140,70,10,0.35) 0%, #030108 65%);
  gap:2.5rem;padding:2rem;text-align:center
}
.setup-candle{font-size:3rem;animation:candleFloat 3s ease-in-out infinite}
@keyframes candleFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.setup-title{
  font-family:'Dancing Script',cursive;font-size:clamp(2.2rem,8vw,4rem);
  color:var(--gold);text-shadow:0 0 40px rgba(201,168,76,0.5);line-height:1.1
}
.setup-tagline{font-style:italic;color:rgba(249,240,225,0.5);font-size:clamp(0.9rem,3vw,1.15rem)}
.role-cards{display:flex;gap:1.5rem;flex-wrap:wrap;justify-content:center}
.role-card{
  background:rgba(255,255,255,0.03);border:1.5px solid rgba(201,168,76,0.25);
  border-radius:24px;padding:2rem 2.5rem;cursor:pointer;min-width:160px;
  transition:all 0.4s cubic-bezier(0.34,1.56,0.64,1);text-align:center;position:relative;overflow:hidden
}
.role-card::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at center,rgba(201,168,76,0.08),transparent);opacity:0;transition:opacity 0.3s}
.role-card:hover::before{opacity:1}
.role-card:hover{transform:translateY(-8px) scale(1.04);border-color:var(--gold);box-shadow:0 20px 50px rgba(201,168,76,0.2)}
.role-card.aloo-card:hover{border-color:var(--rose);box-shadow:0 20px 50px rgba(184,90,120,0.25)}
.role-card .r-avatar{
  width:90px;height:90px;border-radius:50%;object-fit:cover;object-position:top;
  margin-bottom:0.75rem;border:2px solid rgba(201,168,76,0.3)
}
.role-card.aloo-card .r-avatar{border-color:rgba(184,90,120,0.4)}
.role-card .r-name{font-family:'Dancing Script',cursive;font-size:1.7rem;color:var(--gold)}
.role-card.aloo-card .r-name{color:var(--rose-l)}
.role-card .r-sub{font-style:italic;color:rgba(255,255,255,0.35);font-size:0.85rem;margin-top:0.2rem}

/* ═══ ROOM SCREEN ═══ */
#roomScreen{
  background:radial-gradient(ellipse at 50% 40%, rgba(100,50,5,0.3) 0%, #030108 65%);
  gap:1.5rem;padding:2rem;text-align:center
}
.room-title{font-family:'Dancing Script',cursive;font-size:clamp(1.6rem,5vw,2.5rem);color:var(--gold)}
.room-desc{font-style:italic;color:rgba(249,240,225,0.55);font-size:clamp(0.9rem,2.5vw,1.05rem);max-width:360px;line-height:1.75}
.code-box{
  background:rgba(201,168,76,0.06);border:1.5px solid rgba(201,168,76,0.3);
  border-radius:20px;padding:1.4rem 2.5rem;width:100%;max-width:400px
}
.code-label{font-style:italic;color:rgba(249,240,225,0.4);font-size:0.85rem;margin-bottom:0.5rem}
.code-value{
  font-family:'Cormorant Garamond',serif;font-size:1.1rem;color:var(--gold-l);
  word-break:break-all;letter-spacing:0.05em;user-select:all
}
.btn-row{display:flex;gap:0.7rem;flex-wrap:wrap;justify-content:center}
.btn{
  padding:0.8rem 1.8rem;border:none;border-radius:50px;cursor:pointer;
  font-family:'Cormorant Garamond',serif;font-size:1rem;font-weight:600;
  transition:transform 0.2s,box-shadow 0.2s;display:inline-flex;align-items:center;gap:0.4rem
}
.btn-gold{background:linear-gradient(135deg,var(--gold-d),var(--gold));color:#000}
.btn-rose{background:linear-gradient(135deg,#8B2252,var(--rose));color:#fff}
.btn-outline{background:transparent;border:1px solid rgba(201,168,76,0.4);color:var(--gold)}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(201,168,76,0.25)}
.btn-sm{padding:0.5rem 1.2rem;font-size:0.88rem}
.join-input{
  width:100%;max-width:380px;padding:1rem 1.4rem;
  background:rgba(255,255,255,0.04);border:1.5px solid rgba(201,168,76,0.25);
  border-radius:14px;color:var(--gold-l);font-family:'Cormorant Garamond',serif;
  font-size:1rem;outline:none;text-align:center;transition:border-color 0.3s
}
.join-input::placeholder{color:rgba(255,255,255,0.2);font-style:italic}
.join-input:focus{border-color:rgba(201,168,76,0.5);box-shadow:0 0 0 3px rgba(201,168,76,0.08)}
.status-row{display:flex;align-items:center;gap:0.5rem;font-style:italic;color:rgba(255,255,255,0.45);font-size:0.9rem}
.dot{width:9px;height:9px;border-radius:50%;background:rgba(201,168,76,0.5);animation:blink 1.5s ease-in-out infinite;flex-shrink:0}
.dot.green{background:#5cb85c;animation:none}
.dot.red{background:#e05555;animation:none}
.dot.orange{background:#e0943a;animation:none}
@keyframes blink{0%,100%{opacity:0.4}50%{opacity:1}}
.err{color:#ff9090;font-style:italic;font-size:0.88rem;min-height:1.2rem}
.retry-btn{display:none}

/* ═══ DATE NIGHT SCENE ═══ */
#dateScreen{flex-direction:column;overflow:hidden}

/* Top bar */
.top-bar{
  position:absolute;top:0;left:0;right:0;z-index:30;
  display:flex;justify-content:space-between;align-items:center;
  padding:0.6rem 1rem;
  background:linear-gradient(to bottom,rgba(3,1,8,0.8),transparent);
  backdrop-filter:blur(3px)
}
.bar-title{font-family:'Dancing Script',cursive;font-size:clamp(1rem,3.5vw,1.3rem);color:var(--gold);display:flex;align-items:center;gap:0.4rem}
.bar-status{display:flex;align-items:center;gap:0.4rem;font-style:italic;color:rgba(255,255,255,0.45);font-size:0.78rem}
.bar-icons{display:flex;gap:0.4rem}
.icon-btn{background:rgba(255,255,255,0.05);border:1px solid rgba(201,168,76,0.2);border-radius:20px;padding:0.3rem 0.7rem;color:var(--gold);cursor:pointer;font-size:0.9rem;transition:all 0.2s}
.icon-btn:hover{border-color:var(--gold);background:rgba(201,168,76,0.1)}

/* Scene */
.scene{
  flex:1;width:100%;position:relative;overflow:hidden;min-height:0;
  background:
    radial-gradient(ellipse at 50% 100%, rgba(160,80,15,0.55) 0%, rgba(100,40,5,0.25) 20%, transparent 55%),
    radial-gradient(ellipse at 25% 90%, rgba(180,90,20,0.2) 0%, transparent 40%),
    radial-gradient(ellipse at 75% 90%, rgba(180,90,20,0.2) 0%, transparent 40%),
    #030108
}

/* Room wall & floor */
.room-wall{
  position:absolute;inset:0;
  background:
    linear-gradient(to bottom, #0a0518 0%, #060310 50%, #0d060a 100%);
  opacity:0.6
}
.room-floor{
  position:absolute;bottom:0;left:0;right:0;height:28%;
  background:linear-gradient(to bottom, rgba(60,30,10,0.3), rgba(40,18,6,0.6));
  border-top:1px solid rgba(201,168,76,0.08)
}

/* Moon window */
.moon-window{
  position:absolute;top:6%;left:50%;transform:translateX(-50%);
  width:min(170px,36vw);height:min(130px,28vw);
  border:2px solid rgba(201,168,76,0.18);border-radius:10px 10px 50% 50%;
  background:linear-gradient(to bottom, #06021a, #080320);
  overflow:hidden;z-index:2;
  box-shadow:0 0 30px rgba(100,80,200,0.1), inset 0 0 20px rgba(30,15,80,0.5)
}
.moon-window canvas{position:absolute;inset:0;width:100%!important;height:100%!important}
/* curtains */
.moon-window::before,.moon-window::after{
  content:'';position:absolute;top:0;width:22%;height:100%;
  background:linear-gradient(to bottom, #1a0a0e, #0d0508);
  z-index:3
}
.moon-window::before{left:0}
.moon-window::after{right:0}

/* Dining table */
.table-center{
  position:absolute;bottom:0;left:50%;transform:translateX(-50%);
  display:flex;flex-direction:column;align-items:center;
  width:min(280px,48vw);z-index:5
}
.table-surface{
  width:100%;height:min(24px,4.5vw);
  background:linear-gradient(to bottom, #6b3c12, #3e2008);
  border-radius:50% 50% 0 0 / 70% 70% 0 0;
  box-shadow:0 -6px 30px rgba(201,168,76,0.15), 0 0 60px rgba(180,90,15,0.2)
}
.table-items{
  position:absolute;bottom:min(22px,4vw);left:50%;transform:translateX(-50%);
  display:flex;align-items:flex-end;justify-content:center;gap:min(16px,3vw)
}
.cv{display:flex;flex-direction:column;align-items:center}
.cv-flame{
  width:min(11px,2.2vw);height:min(18px,3.5vw);
  background:radial-gradient(ellipse at bottom, #fffce0, #ffca44 35%, #ff8c00 65%, transparent);
  border-radius:50% 50% 30% 30%/60% 60% 40% 40%;
  animation:flicker 1.8s ease-in-out infinite;
  box-shadow:0 0 8px 3px rgba(255,160,40,0.55), 0 0 22px 8px rgba(255,100,10,0.2)
}
@keyframes flicker{0%,100%{transform:scaleX(1) rotate(-1deg)}30%{transform:scaleX(0.82) rotate(2.5deg)}65%{transform:scaleX(1.1) rotate(-2deg)}}
.cv-wick{width:1.5px;height:4px;background:#1a1a1a}
.cv-wax{
  width:min(13px,2.5vw);height:min(34px,6.5vw);
  background:linear-gradient(to right, rgba(255,255,255,0.15), transparent 30%, rgba(255,255,255,0.05) 80%),
             linear-gradient(to bottom, #d8b870, #a07838);
  border-radius:2px 2px 4px 4px
}
.table-rose{font-size:min(26px,5.5vw);line-height:1}

/* Candle ambient glow */
.candle-glow{
  position:absolute;bottom:min(60px,12vw);left:50%;transform:translateX(-50%);
  width:min(350px,65vw);height:min(220px,40vw);
  background:radial-gradient(ellipse, rgba(230,140,30,0.28) 0%, rgba(180,90,10,0.12) 35%, transparent 70%);
  pointer-events:none;filter:blur(10px);z-index:4
}

/* Characters */
.char-wrap{
  position:absolute;bottom:0;z-index:6;
  display:flex;flex-direction:column;align-items:center
}
.char-wrap.aloo-wrap{left:0;width:min(260px,38vw)}
.char-wrap.adnan-wrap{right:0;width:min(260px,38vw)}

.char-img{
  width:100%;height:auto;max-height:62vh;
  object-fit:contain;object-position:bottom;
  display:block
}
/* Aloo has white bg - blend with scene using a container bg that fades */
.aloo-img-wrap{
  position:relative;width:100%;
  background:linear-gradient(to top, rgba(60,25,8,0.7) 0%, rgba(40,15,5,0.4) 30%, rgba(20,8,3,0.1) 70%, transparent 100%)
}
.aloo-img-wrap::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(to right, rgba(8,4,14,0.8) 0%, transparent 25%, transparent 75%, rgba(8,4,14,0.8) 100%)
}
.aloo-img{mix-blend-mode:multiply;filter:brightness(0.97) saturate(1.1)}

/* Adnan dark bg blends naturally */
.adnan-img-wrap{
  position:relative;width:100%;
  background:linear-gradient(to top, rgba(50,20,5,0.6) 0%, transparent 50%)
}
.adnan-img-wrap::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(to left, rgba(8,4,14,0.8) 0%, transparent 25%, transparent 75%, rgba(8,4,14,0.8) 100%)
}
.adnan-img{filter:brightness(0.88) saturate(0.95)}

/* Warm glow on characters from candle */
.char-glow{
  position:absolute;bottom:0;width:100%;height:60%;
  pointer-events:none;z-index:7
}
.aloo-wrap .char-glow{background:linear-gradient(to right, transparent, rgba(220,130,40,0.08))}
.adnan-wrap .char-glow{background:linear-gradient(to left, transparent, rgba(220,130,40,0.08))}

.char-name{
  position:absolute;bottom:8px;left:50%;transform:translateX(-50%);
  font-family:'Dancing Script',cursive;font-size:clamp(0.85rem,3vw,1.15rem);
  color:var(--gold-l);white-space:nowrap;z-index:8;
  text-shadow:0 0 10px rgba(0,0,0,0.8), 0 0 20px rgba(201,168,76,0.3)
}

/* ═══ THOUGHT BUBBLES ═══ */
.thought{
  position:absolute;z-index:20;
  background:rgba(255,252,245,0.97);
  border-radius:20px;padding:0.6rem 0.85rem;
  color:#1a0808;font-size:clamp(0.72rem,2.2vw,0.9rem);
  line-height:1.55;max-width:min(190px,44vw);min-width:70px;
  box-shadow:0 6px 25px rgba(0,0,0,0.5);
  word-wrap:break-word;
  animation:popIn 0.45s cubic-bezier(0.34,1.56,0.64,1) both
}
.thought .t-who{
  font-family:'Dancing Script',cursive;font-size:0.85em;
  display:block;margin-bottom:0.15rem;font-style:normal
}
/* Cloud tail dots */
.thought::before,.thought::after{content:'';position:absolute;background:rgba(255,252,245,0.97);border-radius:50%}
.thought::before{width:11px;height:11px}
.thought::after{width:7px;height:7px}

/* Aloo bubble — top center-right, tail points down-left */
.aloo-thought{
  bottom:82%;
  left:55%
}
.aloo-thought .t-who{color:var(--rose)}
.aloo-thought::before{bottom:-13px;left:20px}
.aloo-thought::after{bottom:-22px;left:15px}

/* Adnan bubble — top center-left, tail points down-right */
.adnan-thought{
  bottom:82%;
  right:55%
}
.adnan-thought .t-who{color:var(--gold)}
.adnan-thought::before{bottom:-13px;right:20px}
.adnan-thought::after{bottom:-22px;right:15px}

.thought.hiding{animation:popOut 0.4s ease forwards}
@keyframes popIn{0%{opacity:0;transform:scale(0.4) translateY(20px)}100%{opacity:1;transform:scale(1) translateY(0)}}
@keyframes popOut{to{opacity:0;transform:scale(0.85) translateY(5px)}}

/* ═══ INPUT AREA ═══ */
.input-area{
  width:100%;display:flex;flex-shrink:0;
  background:rgba(3,1,8,0.97);
  border-top:1px solid rgba(201,168,76,0.1)
}
.panel{flex:1;padding:0.7rem 0.8rem;display:flex;flex-direction:column;gap:0.35rem}
.panel:first-child{border-right:1px solid rgba(201,168,76,0.08)}
.p-label{
  font-family:'Dancing Script',cursive;
  font-size:clamp(0.85rem,2.8vw,1.05rem)
}
.p-label.aloo-label{color:var(--rose-l)}
.p-label.adnan-label{color:var(--gold-l)}
.p-row{display:flex;gap:0.4rem;align-items:center}
.p-input{
  flex:1;background:rgba(255,255,255,0.04);
  border:1px solid rgba(201,168,76,0.18);border-radius:50px;
  padding:0.55rem 1rem;color:var(--cream);
  font-family:'Cormorant Garamond',serif;font-size:clamp(0.82rem,2.5vw,0.95rem);
  outline:none;transition:border-color 0.3s
}
.p-input::placeholder{color:rgba(255,255,255,0.18);font-style:italic}
.p-input:focus{border-color:rgba(201,168,76,0.4)}
.p-send{
  width:36px;height:36px;border-radius:50%;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:0.95rem;flex-shrink:0;transition:transform 0.2s,box-shadow 0.2s
}
.aloo-send{background:linear-gradient(135deg,#8B2252,var(--rose));color:#fff}
.adnan-send{background:linear-gradient(135deg,var(--gold-d),var(--gold));color:#000}
.p-send:active{transform:scale(0.92)}

@media(max-width:480px){
  .input-area{flex-direction:column}
  .panel:first-child{border-right:none;border-bottom:1px solid rgba(201,168,76,0.08)}
  .char-wrap.aloo-wrap,.char-wrap.adnan-wrap{width:min(200px,42vw)}
}
@media(max-width:360px){
  .char-wrap.aloo-wrap,.char-wrap.adnan-wrap{width:min(160px,44vw)}
}
</style>
</head>
<body>

<!-- ══ SETUP ══ -->
<div class="screen active" id="setupScreen">
  <span class="setup-candle">🕯️</span>
  <h1 class="setup-title">Our Date Night</h1>
  <p class="setup-tagline">A candlelit dinner — just for the two of us 🖤</p>
  <div class="role-cards">
    <div class="role-card aloo-card" onclick="selectRole('aloo')">
      <img src="aloo-avatar.png" class="r-avatar" alt="Aloo"/>
      <div class="r-name">I am Aloo</div>
      <div class="r-sub">Alfiya 💛</div>
    </div>
    <div class="role-card" onclick="selectRole('adnan')">
      <img src="adnan-avatar.png" class="r-avatar" alt="Adnan"/>
      <div class="r-name">I am Adnan</div>
      <div class="r-sub">🖤</div>
    </div>
  </div>
</div>

<!-- ══ ROOM SCREEN ══ -->
<div class="screen" id="roomScreen">
  <h2 class="room-title" id="roomTitle">Setting up your table…</h2>
  <p class="room-desc" id="roomDesc">Just a moment 🕯️</p>

  <!-- Adnan: show code -->
  <div id="adnanPanel" style="display:none;flex-direction:column;align-items:center;gap:1rem;width:100%;max-width:400px;padding:0 1.5rem">
    <div class="code-box">
      <div class="code-label">Your Room Code — share with Aloo</div>
      <div class="code-value" id="codeDisplay" style="font-size:1rem;padding:0.3rem 0">—</div>
    </div>
    <div class="btn-row">
      <button class="btn btn-gold btn-sm" onclick="copyCode()">📋 Copy</button>
      <button class="btn btn-gold btn-sm" onclick="waShare()">💬 WhatsApp</button>
    </div>
    <div class="status-row"><span class="dot" id="adnanDot"></span><span id="adnanStatus">Waiting for Aloo to join…</span></div>
  </div>

  <!-- Aloo: enter code -->
  <div id="alooPanel" style="display:none;flex-direction:column;align-items:center;gap:1rem;width:100%;max-width:400px;padding:0 1.5rem">
    <input class="join-input" id="codeInput" placeholder="Paste Adnan's room code here…" autocomplete="off" spellcheck="false"/>
    <button class="btn btn-rose" onclick="joinRoom()">💛 Join Our Date</button>
    <p class="err" id="joinErr"></p>
  </div>

  <div class="status-row" id="loadRow" style="margin-top:0.5rem">
    <span class="dot orange" id="loadDot"></span>
    <span id="loadText">Connecting…</span>
  </div>
  <button class="btn btn-outline btn-sm retry-btn" id="retryBtn" onclick="retryPeer()">🔄 Retry</button>
</div>

<!-- ══ DATE NIGHT ══ -->
<div class="screen" id="dateScreen">

  <div class="top-bar">
    <span class="bar-title">🕯️ Our Date Night</span>
    <div class="bar-status"><span class="dot" id="connDot"></span><span id="connStatus">Connecting…</span></div>
    <div class="bar-icons">
      <button class="icon-btn" id="musicBtn" onclick="toggleMusic()">♪</button>
      <button class="icon-btn" onclick="clearBubbles()" title="Clear messages">✕</button>
    </div>
  </div>

  <div class="scene" id="scene">
    <div class="room-wall"></div>
    <div class="room-floor"></div>
    <div class="candle-glow"></div>

    <!-- Moon window -->
    <div class="moon-window"><canvas id="winCanvas"></canvas></div>

    <!-- Table -->
    <div class="table-center">
      <div class="table-items">
        <div class="cv"><div class="cv-flame"></div><div class="cv-wick"></div><div class="cv-wax"></div></div>
        <div class="table-rose">🌹</div>
        <div class="cv"><div class="cv-flame"></div><div class="cv-wick"></div><div class="cv-wax"></div></div>
      </div>
      <div class="table-surface"></div>
    </div>

    <!-- Aloo -->
    <div class="char-wrap aloo-wrap" id="alooWrap">
      <div class="thought aloo-thought" id="alooThought" style="display:none">
        <span class="t-who">Aloo 💛</span>
        <span id="alooText"></span>
      </div>
      <div class="aloo-img-wrap">
        <img src="aloo-avatar.png" class="char-img aloo-img" alt="Aloo"/>
      </div>
      <div class="char-glow"></div>
      <div class="char-name">Aloo 💛</div>
    </div>

    <!-- Adnan -->
    <div class="char-wrap adnan-wrap" id="adnanWrap">
      <div class="thought adnan-thought" id="adnanThought" style="display:none">
        <span class="t-who">Adnan 🖤</span>
        <span id="adnanText"></span>
      </div>
      <div class="adnan-img-wrap">
        <img src="adnan-avatar.png" class="char-img adnan-img" alt="Adnan"/>
      </div>
      <div class="char-glow"></div>
      <div class="char-name">Adnan 🖤</div>
    </div>
  </div>

  <!-- Inputs -->
  <div class="input-area">
    <div class="panel">
      <div class="p-label aloo-label">Aloo 💛</div>
      <div class="p-row">
        <input class="p-input" id="alooInput" placeholder="Type something, Aloo…" autocomplete="off"/>
        <button class="p-send aloo-send" onclick="sendMsg('aloo')">➤</button>
      </div>
    </div>
    <div class="panel">
      <div class="p-label adnan-label">Adnan 🖤</div>
      <div class="p-row">
        <input class="p-input" id="adnanInput" placeholder="Type something…" autocomplete="off"/>
        <button class="p-send adnan-send" onclick="sendMsg('adnan')">➤</button>
      </div>
    </div>
  </div>

</div><!-- /#dateScreen -->

<audio id="bgAudio" loop src="sitare.mp3"></audio>

<script>
/* ━━━ STATE ━━━ */
let myRole=null, peer=null, conn=null, myPeerId=null, peerTimeout=null;

/* ━━━ SCREENS ━━━ */
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active')}

/* ━━━ SETUP ━━━ */
function selectRole(role){
  myRole=role;
  show('roomScreen');
  if(role==='adnan'){
    document.getElementById('roomTitle').textContent='Your table is ready 🕯️';
    document.getElementById('roomDesc').textContent='Getting your room code — share it with Aloo on WhatsApp.';
    startPeer();
  } else {
    document.getElementById('roomTitle').textContent='Join the table 💛';
    document.getElementById('roomDesc').textContent='Enter the code Adnan sent you.';
    document.getElementById('loadRow').style.display='none';
    startPeer();
    setTimeout(()=>{
      document.getElementById('alooPanel').style.display='flex';
      document.getElementById('codeInput').addEventListener('keydown',e=>{if(e.key==='Enter')joinRoom()});
    },100);
  }
}

/* ━━━ PEER ━━━ */
function startPeer(){
  document.getElementById('loadRow').style.display='flex';
  document.getElementById('loadText').textContent='Connecting to server…';
  document.getElementById('loadDot').className='dot orange';
  document.getElementById('retryBtn').style.display='none';

  peerTimeout=setTimeout(()=>{
    document.getElementById('loadText').textContent='Server is slow — tap Retry';
    document.getElementById('loadDot').className='dot red';
    document.getElementById('retryBtn').style.display='inline-flex';
  },12000);

  peer=new Peer(undefined,{
    config:{iceServers:[
      {urls:'stun:stun.l.google.com:19302'},
      {urls:'stun:stun1.l.google.com:19302'},
      {urls:'stun:stun2.l.google.com:19302'}
    ]}
  });

  peer.on('open',id=>{
    clearTimeout(peerTimeout);
    myPeerId=id;
    document.getElementById('loadRow').style.display='none';
    if(myRole==='adnan'){
      document.getElementById('roomTitle').textContent='Ready! 🕯️';
      document.getElementById('roomDesc').textContent='Share this code with Aloo. Waiting for her to join…';
      document.getElementById('codeDisplay').textContent=id;
      document.getElementById('adnanPanel').style.display='flex';
      peer.on('connection',c=>setupConn(c));
    }
  });

  peer.on('error',err=>{
    clearTimeout(peerTimeout);
    document.getElementById('loadDot').className='dot red';
    document.getElementById('loadText').textContent='Error: '+err.type+'. Tap Retry.';
    document.getElementById('retryBtn').style.display='inline-flex';
    if(err.type==='peer-unavailable')document.getElementById('joinErr').textContent='Code not found. Check and try again.';
  });
}

function retryPeer(){if(peer){try{peer.destroy()}catch(e){}}startPeer()}

/* ━━━ JOIN (Aloo) ━━━ */
function joinRoom(){
  const code=document.getElementById('codeInput').value.trim();
  if(!code){document.getElementById('joinErr').textContent='Please enter the code first.';return}
  document.getElementById('joinErr').textContent='';
  document.getElementById('roomTitle').textContent='Joining… 💛';
  if(!peer||peer.destroyed){document.getElementById('joinErr').textContent='Still connecting, please wait…';return}
  try{const c=peer.connect(code,{reliable:true});setupConn(c)}
  catch(e){document.getElementById('joinErr').textContent='Could not connect. Check the code.'}
}

/* ━━━ CONNECTION ━━━ */
function setupConn(c){
  conn=c;
  let opened=false;
  setTimeout(()=>{if(!opened)document.getElementById('joinErr')&&(document.getElementById('joinErr').textContent='Connection timed out. Check the code.')},15000);

  conn.on('open',()=>{
    opened=true;
    clearTimeout(peerTimeout);
    show('dateScreen');
    initScene();
    document.getElementById('connDot').className='dot green';
    document.getElementById('connStatus').textContent='Connected 🖤';
    conn.send({from:myRole,message:myRole==='aloo'?'💛 Aloo has arrived!':'🖤 Adnan is here!'});
  });

  conn.on('data',data=>{showBubble(data.from,data.message);ping()});
  conn.on('close',()=>{document.getElementById('connDot').className='dot red';document.getElementById('connStatus').textContent='Disconnected 💔'});
  conn.on('error',err=>console.error('conn:',err));
}

/* ━━━ SCENE INIT ━━━ */
function initScene(){
  moonCanvas();
  document.getElementById('alooInput').addEventListener('keydown',e=>{if(e.key==='Enter')sendMsg('aloo')});
  document.getElementById('adnanInput').addEventListener('keydown',e=>{if(e.key==='Enter')sendMsg('adnan')});
  // Highlight own input
  if(myRole==='aloo')document.getElementById('alooInput').style.borderColor='rgba(184,90,120,0.5)';
  else document.getElementById('adnanInput').style.borderColor='rgba(201,168,76,0.5)';
  // Start music
  const a=document.getElementById('bgAudio');
  a.volume=0.35;
  a.play().then(()=>document.getElementById('musicBtn').textContent='🔊').catch(()=>{});
}

/* ━━━ MOON/STARS CANVAS ━━━ */
function moonCanvas(){
  const c=document.getElementById('winCanvas');
  const w=c.parentElement;
  c.width=w.clientWidth*2; c.height=w.clientHeight*2;
  c.style.width=w.clientWidth+'px'; c.style.height=w.clientHeight+'px';
  const ctx=c.getContext('2d');
  const W=c.width,H=c.height;

  const stars=Array.from({length:35},()=>({
    x:Math.random()*W,y:Math.random()*H,
    r:Math.random()*2+0.5,phase:Math.random()*Math.PI*2,speed:0.008+Math.random()*0.015
  }));

  function draw(t){
    ctx.clearRect(0,0,W,H);
    // Moon crescent
    ctx.beginPath();ctx.arc(W*0.78,H*0.28,W*0.1,0,Math.PI*2);
    ctx.fillStyle='rgba(240,225,180,0.9)';ctx.fill();
    ctx.beginPath();ctx.arc(W*0.84,H*0.24,W*0.085,0,Math.PI*2);
    ctx.fillStyle='#06021a';ctx.fill();
    // Stars
    stars.forEach(s=>{
      const a=0.35+0.55*Math.abs(Math.sin(t*s.speed+s.phase));
      ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,245,220,${a})`;ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  requestAnimationFrame(draw);
}

/* ━━━ SEND ━━━ */
function sendMsg(from){
  const inp=document.getElementById(from+'Input');
  const txt=inp.value.trim();
  if(!txt)return;
  inp.value='';
  showBubble(from,txt);
  ping();
  if(conn&&conn.open)conn.send({from,message:txt});
}

/* ━━━ BUBBLES ━━━ */
let timers={aloo:null,adnan:null};
function showBubble(from,txt){
  const b=document.getElementById(from+'Thought');
  const t=document.getElementById(from+'Text');
  b.classList.remove('hiding');
  void b.offsetWidth; // reflow
  b.style.animation='';
  b.style.display='block';
  t.textContent=txt;
  if(timers[from])clearTimeout(timers[from]);
  timers[from]=setTimeout(()=>{
    b.classList.add('hiding');
    setTimeout(()=>b.style.display='none',400);
  },10000);
}
function clearBubbles(){['aloo','adnan'].forEach(r=>{const b=document.getElementById(r+'Thought');b.style.display='none';b.classList.remove('hiding')})}

/* ━━━ MUSIC ━━━ */
function toggleMusic(){
  const a=document.getElementById('bgAudio'),b=document.getElementById('musicBtn');
  a.paused?a.play().then(()=>b.textContent='🔊').catch(()=>{}):(a.pause(),b.textContent='♪');
}

/* ━━━ SHARE ━━━ */
function copyCode(){
  const code=document.getElementById('codeDisplay').textContent;
  navigator.clipboard.writeText(code).then(()=>{
    const b=event.currentTarget;b.textContent='✓ Copied!';
    setTimeout(()=>b.textContent='📋 Copy',2000);
  }).catch(()=>{
    const r=document.createRange();r.selectNode(document.getElementById('codeDisplay'));
    window.getSelection().removeAllRanges();window.getSelection().addRange(r);document.execCommand('copy');
  });
}
function waShare(){
  const code=document.getElementById('codeDisplay').textContent;
  const m=encodeURIComponent('Aloo, join our virtual date night! 🕯️\n\nOpen this link:\nhttps://adnantamboli.github.io/alfiya-universe/virtual-date.html\n\nEnter my room code:\n'+code+'\n\n🖤');
  window.open('https://wa.me/?text='+m,'_blank');
}

/* ━━━ PING ━━━ */
function ping(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    o.frequency.value=880;o.type='sine';
    g.gain.setValueAtTime(0,ctx.currentTime);
    g.gain.linearRampToValueAtTime(0.1,ctx.currentTime+0.01);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.5);
    o.start();o.stop(ctx.currentTime+0.5);
  }catch(e){}
}
</script>
</body>
</html>
